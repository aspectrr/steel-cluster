# Default values for the steel-cluster Helm chart.
# This file controls configurable parameters for deploying:
# - Browser Orchestrator
# - Redis
# - Ingress

global:
  # Optional image pull secrets for all workloads
  imagePullSecrets: []
  # Common labels/annotations applied to most resources
  commonLabels: {}
  commonAnnotations: {}

namespace:
  # If true, the chart will create a Namespace resource
  create: true
  # Namespace to deploy resources into (used by templates and some env vars)
  name: browser-sessions

orchestrator:
  enabled: true
  name: browser-orchestrator

  image:
    repository: ghcr.io/aspectrr/steel-orchestrator
    tag: latest
    pullPolicy: Always

  replicas: 1

  serviceAccount:
    create: true
    name: browser-orchestrator
    annotations: {}

  rbac:
    # Creates Role and RoleBinding scoped to the namespace for orchestrator
    create: true

  service:
    type: LoadBalancer
    port: 3000
    targetPort: 3000
    # Name of the service port (also used by ServiceMonitor)
    portName: http
    annotations: {}

  # Pod annotations
  podAnnotations: {}

  # Container environment variables for the Go orchestrator
  env:
    REDIS_HOST: redis
    REDIS_PORT: "6379"
    # Will default to the Helm namespace if left as empty
    K8S_NAMESPACE: ""
    BROWSER_IMAGE: ghcr.io/steel-dev/steel-browser-api:latest
    BROWSER_PORT: "3000"
    WARM_POOL_SIZE: "2"
    MAX_SESSIONS: "100"
    SESSION_TIMEOUT: "1800"
    BASE_PATH: ""

  # Override the container command (Go binary)
  command: ["/app/orchestrator"]

  # HTTP health endpoints
  livenessProbe:
    enabled: true
    path: /v1/health
    port: 3000
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 1
    failureThreshold: 3
    successThreshold: 1

  readinessProbe:
    enabled: true
    path: /v1/health
    port: 3000
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 1
    failureThreshold: 3
    successThreshold: 1

  resources:
    requests:
      memory: "256Mi"
      cpu: "200m"
    limits:
      memory: "512Mi"
      cpu: "500m"

  nodeSelector: {}
  tolerations: []
  affinity: {}

redis:
  enabled: true
  name: redis

  image:
    repository: redis
    tag: 8-alpine
    pullPolicy: IfNotPresent

  replicas: 1

  service:
    type: ClusterIP
    port: 6379
    targetPort: 6379
    annotations: {}

  # Command-line configuration for Redis
  config:
    appendonly: "yes"
    maxmemory: "256mb"
    maxmemoryPolicy: "allkeys-lru"

  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "200m"

  persistence:
    enabled: false
    # If enabled, define PVC details here
    size: 1Gi
    storageClass: ""
    accessModes:
      - ReadWriteOnce

  nodeSelector: {}
  tolerations: []
  affinity: {}

ingress:
  enabled: true
  # Set to the IngressClass in your cluster (e.g., "nginx")
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
  hosts:
    - host: localhost
      paths:
        # Subpath for Web UI
        - path: /web
          pathType: Prefix
          service:
            name: steel-web
            port: 3001
        # API path to orchestrator
        - path: /api
          pathType: Prefix
          service:
            name: browser-orchestrator
            port: 3000
        # Root path to web (default)
        # - path: /
        #   pathType: Prefix
        #   service:
        #     name: steel-web
        #     port: 3001
  tls: []
  # - secretName: steel-cluster-tls
  #   hosts:
  #     - your.domain.tld

web:
  enabled: true
  name: steel-web

  image:
    repository: ghcr.io/aspectrr/steel-web
    tag: latest
    pullPolicy: Always

  replicas: 1

  service:
    type: LoadBalancer
    port: 5173
    targetPort: 3001
    # Name of the service port
    portName: http
    annotations: {}

  # Pod annotations
  podAnnotations: {}

  # Container environment variables for the web app
  env:
    NODE_ENV: production
    # Add any other environment variables your web app needs
    VITE_API_URL: "http://browser-orchestrator:3000/v1"
    VITE_WS_URL: "ws://browser-orchestrator:3000/v1"

  # HTTP health endpoints
  livenessProbe:
    enabled: true
    path: /
    port: 3001
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
    successThreshold: 1

  readinessProbe:
    enabled: true
    path: /
    port: 3001
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 5
    failureThreshold: 3
    successThreshold: 1

  resources:
    requests:
      memory: "256Mi"
      cpu: "200m"
    limits:
      memory: "512Mi"
      cpu: "500m"

  nodeSelector: {}
  tolerations: []
  affinity: {}
