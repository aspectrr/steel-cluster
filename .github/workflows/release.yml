name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: orchestrator/go.mod

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to GHCR for Helm
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package and push Helm chart
        run: |
          # Strip the leading 'v' from the tag for semver compatibility
          CHART_VERSION="${GITHUB_REF_NAME#v}"
          helm package ./helm/steel-cluster \
            --app-version "${GITHUB_REF_NAME}" \
            --version "${CHART_VERSION}"
          helm push steel-cluster-*.tgz oci://ghcr.io/${{ github.repository_owner }}/charts
