apiVersion: apps/v1
kind: Deployment
metadata:
  name: browser-orchestrator
  namespace: browser-sessions
spec:
  selector:
    matchLabels:
      app: browser-orchestrator
  template:
    metadata:
      labels:
        app: browser-orchestrator
    spec:
      serviceAccountName: browser-orchestrator
      containers:
        - name: orchestrator
          image: browser-orchestrator:latest
          imagePullPolicy: Never
          command: ["/app/orchestrator"]
          ports:
            - containerPort: 3000
          env:
            - name: REDIS_HOST
              value: "redis"
            - name: REDIS_PORT
              value: "6379"
            - name: K8S_NAMESPACE
              value: "browser-sessions"
            - name: BROWSER_IMAGE
              value: "ghcr.io/steel-dev/steel-browser-api:latest"
            - name: BROWSER_PORT
              value: "3000"
            - name: WARM_POOL_SIZE
              value: "2"
            - name: MAX_SESSIONS
              value: "100"
            - name: SESSION_TIMEOUT
              value: "1800"
            - name: BASE_PATH
              value: ""
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /v1/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /v1/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
