apiVersion: apps/v1
kind: Deployment
metadata:
  name: steel-web
  namespace: browser-sessions
spec:
  selector:
    matchLabels:
      app: steel-web
  template:
    metadata:
      labels:
        app: steel-web
    spec:
      containers:
        - name: web
          image: steel-web:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3001
---
apiVersion: v1
kind: Service
metadata:
  name: steel-web
  namespace: browser-sessions
spec:
  type: NodePort
  selector:
    app: steel-web
  ports:
    - port: 3001
      targetPort: 3001
      nodePort: 30301
