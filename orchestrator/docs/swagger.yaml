basePath: /v1
definitions:
  main.HealthResponse:
    properties:
      basePath:
        type: string
      namespace:
        type: string
      sessions:
        type: integer
      status:
        type: string
      timestamp:
        type: string
      warmPoolReady:
        type: integer
    type: object
host: localhost:3000
info:
  contact: {}
  description: Kubernetes-based browser session orchestrator. Creates isolated browser
    pods per session, routes HTTP and WebSocket (CDP) traffic, and maintains a warm
    pool for fast session startup.
  license:
    name: MIT
  title: Steel Cluster Orchestrator API
  version: 1.0.0
paths:
  /health:
    get:
      description: Returns orchestrator health, active session count, and warm pool
        status.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.HealthResponse'
      summary: Health check
      tags:
      - system
  /sessions:
    get:
      description: Returns all active and recent sessions with full Steel API details.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: List all sessions
      tags:
      - sessions
    post:
      consumes:
      - application/json
      description: Creates a new browser session with an isolated pod. Claims a warm
        pod if available (~85ms), otherwise creates a fresh pod (~30s cold start).
      parameters:
      - description: Session options
        in: body
        name: body
        schema:
          type: object
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "429":
          description: Too Many Requests
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Create a browser session
      tags:
      - sessions
  /sessions/{sessionId}:
    get:
      description: Returns full session data in the Steel API format.
      parameters:
      - description: Session ID
        in: path
        name: sessionId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Get session details
      tags:
      - sessions
  /sessions/{sessionId}/release:
    post:
      description: Releases the session, its pod, and service.
      parameters:
      - description: Session ID
        in: path
        name: sessionId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "429":
          description: Too Many Requests
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Release a session
      tags:
      - sessions
  /sessions/{sessionId}/status:
    get:
      description: Returns the current status and health of a session.
      parameters:
      - description: Session ID
        in: path
        name: sessionId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get session status
      tags:
      - sessions
  /sessions/release:
    post:
      description: Releases all sessions, their pods, and services.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Release all sessions
      tags:
      - sessions
swagger: "2.0"
